version: '3'
services:
  frontend:
    image: nginx:alpine
    volumes:
      # This connects the files GitHub sent to the Nginx folder
      - /var/www/homesqre/frontend:/usr/share/nginx/html
    ports:
      - "80:80"
    restart: always

  backend:
    # ... your existing backend config ...
    restart: always

  mongo:
    # ... your existing mongo config ...
    restart: always
