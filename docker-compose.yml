services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:27017:27017"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URL: "mongodb://mongo:27017"
      DB_NAME: "${DB_NAME:-homesqre}"
      JWT_SECRET: "${JWT_SECRET:-HomesqreSecureKey2026!xyz}"
      APP_NAME: "${APP_NAME:-homesqre}"
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
      COOKIE_SAMESITE: "${COOKIE_SAMESITE:-lax}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      STORAGE_BACKEND: "${STORAGE_BACKEND:-local}"
      LOCAL_STORAGE_DIR: "/app/backend/uploads"
      EMERGENT_LLM_KEY: "${EMERGENT_LLM_KEY:-}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@homesqre.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-Homesqre@2026}"
    volumes:
      - uploads:/app/backend/uploads
    ports:
      - "127.0.0.1:8001:8001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=https://homesqre.com
        - REACT_APP_GOOGLE_CLIENT_ID=792218859682-0c3n97260bmmnihocosutpm00vvliivt.apps.googleusercontent.com
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  uploads:
