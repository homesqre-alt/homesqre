name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy to Hostinger VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 60s
          command_timeout: 18m
          script: |
            set -e

            APP_DIR="/root/homesqre-app"

            # ── Clone repo on first run ────────────────────────────────────
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "==> First run: cloning repository..."
              git clone https://github.com/homesqre-alt/homesqre.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            # ── Pull latest code ───────────────────────────────────────────
            echo "==> Pulling latest code from main..."
            git fetch origin main
            git reset --hard origin/main

            # ── Verify required env files exist ────────────────────────────
            if [ ! -f ".env" ]; then
              echo "ERROR: .env not found at $APP_DIR/.env"
              echo "Create it with: REACT_APP_BACKEND_URL=https://yourdomain.com"
              exit 1
            fi
            if [ ! -f "backend/.env.prod" ]; then
              echo "ERROR: backend/.env.prod not found"
              echo "Copy backend/.env.prod.example and fill in your secrets"
              exit 1
            fi

            # ── Build & restart containers ─────────────────────────────────
            echo "==> Building Docker images..."
            docker compose -f docker-compose.prod.yml build --no-cache --pull

            echo "==> Starting containers..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # ── Health check ───────────────────────────────────────────────
            echo "==> Waiting for backend health check..."
            sleep 10
            docker compose -f docker-compose.prod.yml ps

            # ── Cleanup old images ─────────────────────────────────────────
            echo "==> Cleaning up dangling images..."
            docker image prune -f

            echo ""
            echo "✅ Deployment complete!"
            echo "   Frontend: http://localhost:3000"
            echo "   Backend:  http://localhost:8001/api/"
