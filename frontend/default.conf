# /etc/nginx/conf.d/default.conf
# Homesqre — Frontend container nginx
# Serves built React SPA on :80 and reverse-proxies /api/* to the backend container.

server {
    listen 80;
    server_name _;

    # Allow large uploads (floor plans, PDFs, images)
    client_max_body_size 25M;

    # ---- Static SPA assets ----
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed static bundles (CRA emits content-hashed filenames)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Backend API reverse proxy ----
    # The backend already mounts its routes at /api/, so we forward
    # the URI as-is (no path rewriting, no trailing slash on proxy_pass).
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_buffering off;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 60s;
    }

    # ---- SPA fallback ----
    # Any non-API, non-asset path falls back to index.html so React Router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Friendly errors fall back to the SPA too
    error_page 404 /index.html;
}
